{% extends "admin/base_site.html" %}
{% load static %}
{% block extrahead %}
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="{% static 'admin/custom.css' %}">
    <script>    
        let clickedButton = null;

        document.addEventListener("click", e => {
            clickedButton = e.target.closest('button[type="submit"], input[type="submit"]');
        });

        document.addEventListener("submit", e => {
            if (!clickedButton) return;

            if (clickedButton.name) {
                const hidden = document.createElement("input");
                hidden.type = "hidden";
                hidden.name = clickedButton.name;
                hidden.value = clickedButton.value;
                e.target.appendChild(hidden);
            }

            clickedButton.disabled = true;
        });
    </script>
{% endblock %}
