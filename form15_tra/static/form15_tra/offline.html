<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1d4ed8" />
    <title>غير متصل</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 48px 16px; }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 1px 2px rgba(0,0,0,.04);
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0; line-height: 1.7; color: #374151; }
      .hint { margin-top: 14px; font-size: 14px; color: #6b7280; }
      .btn {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        background: #f3f4f6;
        color: #111827;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>لا يمكن تحميل هذه الصفحة الآن. تأكد من الاتصال ثم أعد المحاولة.</p>
        <div class="hint">ملاحظة: يتم حفظ ملفات الواجهة (مثل CSS) لتعمل بشكل أفضل عند ضعف الشبكة.</div>
        <a class="btn" href="/app/invoice/">إعادة المحاولة</a>
      </div>
    </div>
  </body>
</html>
