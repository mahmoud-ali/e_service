{% extends "admin/change_form.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
    #photo-container {
        float: left;
        margin: 0 15px 10px 0;
        background: #fff;
        border: 2px solid #417690;
        border-radius: 6px;
        padding: 5px;
    }
    #photo-container img {
        display: block;
        max-width: 110px;
        max-height: 140px;
        border-radius: 3px;
    }
    #photo-container .photo-label {
        text-align: center;
        font-size: 11px;
        color: #417690;
        margin-top: 3px;
    }
    #photo-container.empty {
        display: none;
    }
</style>
{% endblock %}

{% block admin_change_form_document_ready %}
{{ block.super }}
<script>
(function($) {
    var identityField = $('#id_almustafid_identity');
    var nameField = $('#id_almustafid_name');

    var container = $('<div id="photo-container" class="empty"><img /></div>');
    $('#content-main').prepend(container);

    var showPhoto = function(src) {
        if (src) {
            container.find('img').attr('src', src);
            container.removeClass('empty');
        } else {
            container.addClass('empty');
        }
    };

    {% if original and original.almustafid_photo %}
    showPhoto('data:image/jpeg;base64,{{ original.almustafid_photo_base64 }}');
    {% endif %}

    if (identityField.length && nameField.length) {
        // Auto-convert Arabic digits to English
        var arabicDigits = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
        identityField.on('input blur', function() {
            var val = $(this).val();
            var converted = val.replace(/[٠-٩]/g, function(d) { return arabicDigits[d]; });
            if (val !== converted) {
                $(this).val(converted);
            }
        });

        var photoDataField = $('<input type="hidden" name="almustafid_photo_data" id="id_almustafid_photo_data">');
        $('#content-main form').append(photoDataField);

        var btn = $('<button type="button" class="button" style="margin-right:5px;">{% translate "بحث" %}</button>');
        btn.insertAfter(identityField);

        function checkExpiredRecords(identity, getCookie) {
            $.ajax({
                url: window.location.pathname.replace(/\/add\/.*$|\/\d+\/change\/.*$/, '/identity-expired-check/'),
                method: 'POST',
                data: { identity: identity },
                headers: {'X-CSRFToken': getCookie('csrftoken')},
                success: function(data) {
                    $('#expired-warning').remove();
                    if (data.expired_count > 0) {
                        var changelistUrl = window.location.pathname.replace(/add\/.*$|\d+\/change\/.*$/, '')
                            + '?q=' + encodeURIComponent(identity) + '&state__exact=3';
                        var warning = $('<div id="expired-warning" style="background:#fff3cd; border:1px solid #ffc107; border-radius:4px; padding:10px 12px; margin-top:8px;">'
                            + '⚠️ {% translate "تنبيه: يوجد" %} ' + data.expired_count + ' {% translate "استمارة منتهية الصلاحية لهذا المستفيد." %} '
                            + '<a href="' + changelistUrl + '" target="_blank">{% translate "عرض الاستمارات المنتهية" %}</a>'
                            + '</div>');
                        warning.insertAfter(identityField.parent());
                    }
                }
            });
        }

        btn.on('click', function(e) {
            e.preventDefault();
            var identity = identityField.val().trim();
            if (!identity) {
                alert('{% translate "ادخل الرقم الوطني." %}');
                return;
            }

            btn.prop('disabled', true).text('{% translate "جاري البحث..." %}');

            function getCookie(name) { var v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)'); return v ? v[2] : null; }

            checkExpiredRecords(identity, getCookie);

            $.ajax({
                url: window.location.pathname.replace(/\/add\/.*$|\/\d+\/change\/.*$/, '/identity-lookup/'),
                method: 'POST',
                data: { identity: identity },
                headers: {'X-CSRFToken': getCookie('csrftoken')},
                success: function(data) {
                    btn.prop('disabled', false).text('{% translate "بحث" %}');
                    var displayName = data.full_name || data.name || '';
                    if (displayName) {
                        nameField.val(displayName);
                    }
                    var photoData = data.photo_base64 || data.photo || '';
                    if (photoData) {
                        var src = photoData;
                        if (!src.startsWith('data:')) {
                            src = 'data:image/jpeg;base64,' + src;
                        }
                        showPhoto(src);
                        photoDataField.val(src);
                    } else {
                        showPhoto(null);
                        photoDataField.val('');
                    }
                },
                error: function(xhr, status, err) {
                    btn.prop('disabled', false).text('{% translate "بحث" %}');
                    alert('{% translate "خدمة السجل المدني متوقفة مؤقتاً. قم بإدخال البيانات يدوياً" %}');
                }
            });
        });
    }
})(django.jQuery);
</script>
{% endblock %}
